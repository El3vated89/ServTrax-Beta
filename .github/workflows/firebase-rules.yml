name: Deploy Firebase Rules

on:
  push:
    branches:
      - main
    paths:
      - firestore.rules
      - storage.rules
      - firebase.json
      - .firebaserc
      - .github/workflows/firebase-rules.yml
  workflow_dispatch:

jobs:
  deploy-firebase-rules:
    runs-on: ubuntu-latest
    env:
      FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GEN_LANG_CLIENT_0817756399 }}

    steps:
      - uses: actions/checkout@v4

      - id: firebase-secret-check
        run: |
          if [ -z "${FIREBASE_SERVICE_ACCOUNT_JSON}" ]; then
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "Firebase service account secret is not configured. Skipping Firebase rules deploy."
          else
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.firebase-secret-check.outputs.should_deploy == 'true'
        with:
          node-version: 20

      - uses: google-github-actions/auth@v2
        if: steps.firebase-secret-check.outputs.should_deploy == 'true'
        with:
          credentials_json: ${{ env.FIREBASE_SERVICE_ACCOUNT_JSON }}

      - run: npm install -g firebase-tools
        if: steps.firebase-secret-check.outputs.should_deploy == 'true'

      - run: firebase deploy --project gen-lang-client-0817756399 --only firestore,storage --non-interactive
        if: steps.firebase-secret-check.outputs.should_deploy == 'true'
