GITHUB ACTIONS FIX — CLEAN RESET

1. Delete this file:
   .github/workflows/main.yml

2. Commit the deletion

3. Create a NEW file:
   .github/workflows/pages.yml

4. Paste this EXACTLY:

name: Deploy Pages

on:
push:
branches: ["main"]
workflow_dispatch:

permissions:
contents: read
pages: write
id-token: write

concurrency:
group: "pages"
cancel-in-progress: true

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - uses: actions/checkout@v4

  - uses: actions/setup-node@v4
    with:
      node-version: 20
      cache: npm

  - run: npm ci

  - run: npm run build

  - uses: actions/configure-pages@v5

  - uses: actions/upload-pages-artifact@v3
    with:
      path: ./dist
```

deploy:
needs: build
runs-on: ubuntu-latest

```
environment:
  name: github-pages
  url: ${{ steps.deployment.outputs.page_url }}

steps:
  - id: deployment
    uses: actions/deploy-pages@v4
```

5. Commit changes

IMPORTANT:

* use spaces, not tabs
* do not add backticks
* do not add extra text above "name:"
